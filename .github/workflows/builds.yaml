---
name: builds
on:
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  check-changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      - name: check-relevant-changes
        id: filter
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          FILES=$(gh pr view ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --json files --jq '.files[].path')
          if echo "$FILES" | grep -iqE '^(Cargo\.toml$|Cargo\.lock$|.*\.rs$|\.build/|\.config/|nuget\.config$)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "No relevant files changed, skipping build"
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

  BuildTestAndCheck:
    needs: check-changes
    if: needs.check-changes.outputs.relevant == 'true'
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      # Step 1: Checkout the repo
      - name: checkout-repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          path: sortah
      # Step 2: Run the build script
      - name: run-build-script
        shell: pwsh
        run: |
            ./sortah/.build/build.ps1 `
              -GitHubRepoName 'sortah' `
              -BranchName $env:GITHUB_REF `
              -Build 'BuildTestAndCheck' `
              -Verbose
